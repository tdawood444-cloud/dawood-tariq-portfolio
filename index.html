<style>
:root{
  --bg:#050816;
  --bg2:#070B14;
  --purple:#9B5CFF;
  --cyan:#00D4FF;
  --blue:#3B82F6;
  --text:#F8FAFC;
  --muted:#A8B3CF;
  --line:rgba(139,92,246,.28);
  --glass:rgba(255,255,255,.075);
}

*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{
  font-family:'Inter',sans-serif;
  background:
    radial-gradient(circle at 15% 20%, rgba(155,92,255,.22), transparent 28%),
    radial-gradient(circle at 85% 18%, rgba(0,212,255,.18), transparent 30%),
    radial-gradient(circle at 50% 100%, rgba(59,130,246,.14), transparent 35%),
    linear-gradient(135deg,#02040d,#050816 45%,#07111f);
  color:var(--text);
  overflow-x:hidden;
}
body::before{
  content:"";
  position:fixed;
  inset:0;
  pointer-events:none;
  background-image:
    linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
    linear-gradient(90deg,rgba(255,255,255,.025) 1px, transparent 1px);
  background-size:42px 42px;
  mask-image:linear-gradient(to bottom,rgba(0,0,0,.7),transparent 75%);
  z-index:-2;
}
a{text-decoration:none;}

header{
  position:sticky;
  top:0;
  z-index:999;
  padding:16px 7%;
  background:rgba(5,8,22,.76);
  backdrop-filter:blur(22px);
  border-bottom:1px solid var(--line);
  display:flex;
  align-items:center;
  justify-content:space-between;
}
.brand{display:flex;align-items:center;gap:12px;}
.brand img{
  width:58px;
  height:58px;
  object-fit:contain;
  display:block;
  filter:drop-shadow(0 0 16px rgba(0,212,255,.35));
}
.brand h3{
  font-family:'Space Grotesk',sans-serif;
  color:var(--text);
  font-size:18px;
}
.brand p{color:var(--muted);font-size:12px;margin-top:2px;}
nav{display:flex;gap:22px;}
nav a{
  color:#fff;
  font-size:14px;
  font-weight:700;
  opacity:.88;
  position:relative;
}
nav a:hover{color:var(--cyan);}
nav a::after{
  content:"";
  position:absolute;
  left:0;
  bottom:-8px;
  width:0;
  height:2px;
  border-radius:20px;
  background:linear-gradient(90deg,var(--purple),var(--cyan));
  transition:.3s;
}
nav a:hover::after{width:100%;}
.menu-btn{
  display:none;
  background:rgba(255,255,255,.06);
  border:1px solid rgba(255,255,255,.22);
  color:#fff;
  font-size:28px;
  padding:8px 14px;
  border-radius:12px;
  cursor:pointer;
  box-shadow:0 0 20px rgba(155,92,255,.18);
}

/* HERO 3D */
.hero{
  min-height:88vh;
  padding:90px 7% 65px;
  display:grid;
  grid-template-columns:1.05fr .95fr;
  align-items:center;
  gap:50px;
  position:relative;
  overflow:hidden;
  isolation:isolate;
  perspective:1200px;
}
.hero::before{
  content:"";
  position:absolute;
  width:380px;
  height:380px;
  left:-120px;
  top:120px;
  border-radius:42%;
  background:radial-gradient(circle,rgba(155,92,255,.32),transparent 65%);
  filter:blur(18px);
  animation:orbMove 9s ease-in-out infinite;
  z-index:-1;
}
.hero::after{
  content:"";
  position:absolute;
  width:320px;
  height:320px;
  right:-80px;
  top:120px;
  border-radius:50%;
  background:radial-gradient(circle,rgba(0,212,255,.26),transparent 65%);
  filter:blur(18px);
  animation:orbMove2 10s ease-in-out infinite;
  z-index:-1;
}
@keyframes orbMove{
  0%,100%{transform:translateY(0) scale(1);}
  50%{transform:translateY(-35px) scale(1.12);}
}
@keyframes orbMove2{
  0%,100%{transform:translateY(0) scale(1);}
  50%{transform:translateY(32px) scale(1.08);}
}
.particle{
  position:absolute;
  width:9px;
  height:9px;
  border-radius:50%;
  background:linear-gradient(135deg,var(--purple),var(--cyan));
  opacity:.42;
  filter:blur(.2px);
  animation:particleFloat 9s ease-in-out infinite;
  z-index:-1;
}
.p1{left:12%;top:26%;animation-delay:.2s;}
.p2{left:45%;top:18%;animation-delay:1s;}
.p3{right:18%;top:35%;animation-delay:1.6s;}
.p4{left:32%;bottom:18%;animation-delay:2.1s;}
.p5{right:8%;bottom:22%;animation-delay:2.7s;}
@keyframes particleFloat{
  0%,100%{transform:translateY(0) translateX(0);opacity:.32;}
  50%{transform:translateY(-35px) translateX(18px);opacity:.75;}
}
.kicker{
  display:inline-flex;
  align-items:center;
  gap:8px;
  color:#dce7ff;
  font-size:12px;
  font-weight:900;
  letter-spacing:1.8px;
  text-transform:uppercase;
  padding:9px 14px;
  border-radius:999px;
  background:rgba(255,255,255,.055);
  border:1px solid rgba(255,255,255,.12);
}
.kicker::before{
  content:"";
  width:9px;
  height:9px;
  border-radius:50%;
  background:#22c55e;
  box-shadow:0 0 14px #22c55e;
}
.hero h1{
  margin-top:18px;
  font-family:'Space Grotesk',sans-serif;
  font-size:64px;
  line-height:1.04;
  letter-spacing:-1.8px;
}
.hero h1 span{
  background:linear-gradient(90deg,var(--purple),var(--cyan));
  -webkit-background-clip:text;
  color:transparent;
}
.hero h2{
  margin-top:18px;
  font-size:22px;
  font-weight:600;
  color:#eef4ff;
}
.hero p{
  margin-top:20px;
  color:var(--muted);
  line-height:1.8;
  max-width:650px;
  font-size:16px;
}
.hero-actions{
  margin-top:32px;
  display:flex;
  gap:14px;
  flex-wrap:wrap;
}
.btn{
  padding:14px 25px;
  border-radius:14px;
  font-weight:900;
  font-size:14px;
  transition:.3s;
  display:inline-flex;
  align-items:center;
  justify-content:center;
  gap:8px;
  transform-style:preserve-3d;
}
.btn-primary{
  background:linear-gradient(135deg,var(--purple),var(--cyan));
  color:#fff;
  box-shadow:0 14px 35px rgba(0,212,255,.22);
}
.btn-secondary{
  border:1px solid rgba(255,255,255,.16);
  color:#fff;
  background:rgba(255,255,255,.035);
}
.btn:hover{
  transform:translateY(-6px) scale(1.03);
  box-shadow:0 22px 55px rgba(0,212,255,.26);
}
.hero-mini{
  margin-top:26px;
  display:grid;
  grid-template-columns:repeat(2,minmax(150px,1fr));
  gap:12px;
  max-width:520px;
}
.hero-mini div{
  padding:13px 14px;
  border-radius:18px;
  background:rgba(255,255,255,.055);
  border:1px solid rgba(255,255,255,.12);
  color:#eaf6ff;
  font-weight:800;
  box-shadow:0 18px 40px rgba(0,0,0,.22);
  transition:.35s;
}
.hero-mini div:hover{
  transform:translateY(-7px) rotateX(5deg);
  border-color:rgba(0,212,255,.45);
  box-shadow:0 22px 60px rgba(0,212,255,.16);
}
.hero-card{
  position:relative;
  background:
    radial-gradient(circle at 50% 15%,rgba(0,212,255,.17),transparent 32%),
    linear-gradient(145deg,rgba(255,255,255,.12),rgba(255,255,255,.035));
  border:1px solid rgba(255,255,255,.14);
  border-radius:34px;
  padding:38px 36px 42px;
  text-align:center;
  box-shadow:
    0 35px 90px rgba(0,0,0,.45),
    inset 0 1px 0 rgba(255,255,255,.16),
    0 0 90px rgba(0,212,255,.16);
  transform-style:preserve-3d;
  animation:cardFloat 6s ease-in-out infinite;
}
.hero-card::before{
  content:"";
  position:absolute;
  inset:-1px;
  border-radius:34px;
  background:linear-gradient(135deg,rgba(155,92,255,.55),rgba(0,212,255,.45),transparent 60%);
  z-index:-1;
  filter:blur(14px);
  opacity:.58;
}
.hero-card::after{
  content:"";
  position:absolute;
  left:50%;
  bottom:26px;
  width:68%;
  height:18px;
  transform:translateX(-50%) perspective(400px) rotateX(62deg);
  background:linear-gradient(90deg,transparent,rgba(0,212,255,.65),rgba(155,92,255,.55),transparent);
  filter:blur(10px);
  opacity:.9;
  animation:platformGlow 4s ease-in-out infinite;
}
@keyframes cardFloat{
  0%,100%{transform:translateY(0) rotateX(0) rotateY(0);}
  50%{transform:translateY(-14px) rotateX(2deg) rotateY(-2deg);}
}
@keyframes platformGlow{
  0%,100%{opacity:.55;width:58%;}
  50%{opacity:1;width:75%;}
}
.hero-card:hover{
  transform:translateY(-16px) rotateX(5deg) rotateY(-5deg) scale(1.02);
}
.hero-logo{
  width:285px;
  height:auto;
  max-height:285px;
  object-fit:contain;
  border-radius:0;
  background:transparent;
  border:none;
  padding:0;
  box-shadow:none;
  display:block;
  margin:auto;
  filter:drop-shadow(0 28px 50px rgba(0,212,255,.40));
  animation:logoFloat 5s ease-in-out infinite;
  position:relative;
  z-index:2;
}
@keyframes logoFloat{
  0%,100%{transform:translateY(0) scale(1);}
  50%{transform:translateY(-15px) scale(1.035);}
}
.hero-card h3{
  margin-top:24px;
  font-family:'Space Grotesk',sans-serif;
  color:#fff;
  font-size:25px;
  position:relative;
  z-index:2;
}
.hero-card p{
  margin:10px auto 0;
  font-size:14px;
  color:var(--muted);
  position:relative;
  z-index:2;
}
.available{
  margin:20px auto 0;
  display:inline-block;
  padding:10px 16px;
  border-radius:30px;
  background:rgba(34,197,94,.08);
  border:1px solid rgba(34,197,94,.45);
  color:#4ade80;
  font-weight:900;
  font-size:13px;
  position:relative;
  z-index:2;
}
